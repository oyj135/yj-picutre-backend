server:
  port: 8123
  servlet:
    context-path: /api
spring:
  application:
    name: yj-picture-backend
    # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/yj_picture
    username: root
    password: 123456
  # 开放更大的文件上传体积
  servlet:
    multipart:
      max-file-size: 10MB
# mybatis-plus 配置
mybatis-plus:
  configuration:
    # 仅在开发环境打印日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 关闭驼峰转下划线
    map-underscore-to-camel-case: false
  global-config:
    db-config:
      logic-delete-field: isDelete # 逻辑删除字段名
      logic-delete-value: 1 # 逻辑已删除值 (默认为 1)
      logic-not-delete-value: 0 # 逻辑未删除值 (默认为 0)
# 接口文档配置
# springdoc-openapi项目配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html # 访问路径
    tags-sorter: alpha # 按字母顺序排序
    # 同一分组下接口方法的排序方式
    operations-sorter: alpha # 按字母顺序排序，method（按 HTTP 方法排序）、default（默认顺序）
  api-docs:
    # OpenAPI 规范 JSON 数据的访问路径
    path: /v3/api-docs
  # 分组配置
  group-configs:
    - group: default
      paths-to-match: '/**'
      packages-to-scan: pres.yj.controller # 指定要扫描的 Controller 包路径
# knife4j的增强配置
knife4j:
  enable: true
  setting:
    language: zh_cn
# 对象存储配置
cos:
  client:
    host: xxx
    secretId: xxx
    secretKey: xxx
    region: xxx
    bucket: xxx


